version: "3.7"
services:
  audiobookshelf:
    container_name: audiobookshelf-server
    image: ghcr.io/advplyr/audiobookshelf:latest
    environment:
      - AUDIOBOOKSHELF_UID=${AUDIOBOOKSHELF_UID}
      - AUDIOBOOKSHELF_GID=${AUDIOBOOKSHELF_GID}
    ports:
      - "${AUDIOBOOKSHELF_HOST_PORT}:80"
    volumes:
      - /mnt/media/audiobooks:/audiobooks
      - /mnt/media/podcasts:/podcasts
      - /appdata/docker/audiobookshelf/config:/config
      - /appdata/docker/audiobookshelf/metadata:/metadata
    restart: unless-stopped
